<!DOCTYPE html>
<html>
<head>
    <title>Asistente IA</title>
</head>
<body>

<h1>Asistente Web - IA</h1>

<h3>Escribí contexto:</h3>
<textarea id="textInput" rows="6" cols="60"
placeholder="Ej: problema de depósito, ideas, etc..."></textarea>

<br><br>

<h3>Subir archivos:</h3>
<input type="file" id="files" multiple />

<br><br>

<button onclick="upload()">Enviar</button>

<h3>Respuesta:</h3>
<pre id="output"></pre>

<script>
async function upload() {
    const files = document.getElementById('files').files;
    const text = document.getElementById('textInput').value;

    if (files.length === 0 && text.trim() === "") {
        alert("Ingresá texto o subí archivos");
        return;
    }

    const formData = new FormData();

    formData.append("text", text);

    for (let i = 0; i < files.length; i++) {
        formData.append('files', files[i]);
    }

    try {
        const res = await fetch('https://asistente-12gk.onrender.com/upload', {
            method: 'POST',
            body: formData
        });

        const data = await res.json();

        document.getElementById('output').innerText =
            data.response || JSON.stringify(data, null, 2);

    } catch (error) {
        document.getElementById('output').innerText =
            "Error: " + error;
    }
}
</script>

</body>
</html>
