<!DOCTYPE html>
<html>
<head>
    <title>Asistente IA</title>
</head>
<body>

<h1>Asistente Web - IA</h1>

<input type="file" id="files" multiple />
<button onclick="upload()">Subir archivos</button>

<h3>Respuesta:</h3>
<pre id="output"></pre>

<script>
async function upload() {
    const files = document.getElementById('files').files;

    if (files.length === 0) {
        alert("Subí al menos un archivo");
        return;
    }

    const formData = new FormData();

    for (let i = 0; i < files.length; i++) {
        formData.append('files', files[i]);
    }

    try {
        const res = await fetch('https://asistente-12gk.onrender.com/upload', {
            method: 'POST',
            body: formData
        });

        const data = await res.json();

        document.getElementById('output').innerText =
            data.response || JSON.stringify(data, null, 2);

    } catch (error) {
        document.getElementById('output').innerText =
            "Error conectando con backend: " + error;
    }
}
</script>

</body>
</html>
